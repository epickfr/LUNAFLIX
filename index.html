<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LunaFlix</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #0f0c1a;
      color: #e0d8ff;
      overflow: hidden;
    }
    #sidebar {
      width: 380px;
      background: #0f0c1a;
      border-right: 1px solid #2a2550;
      display: flex;
      flex-direction: column;
      z-index: 2;
    }
    #header {
      padding: 20px 24px;
      font-size: 1.8rem;
      font-weight: bold;
      color: #a78bfa;
      letter-spacing: -0.5px;
      border-bottom: 1px solid #2a2550;
    }
    #toggle {
      display: flex;
      padding: 16px 24px;
      gap: 12px;
    }
    button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 4px;
      background: #1e1b38;
      color: #e0d8ff;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    button:hover { background: #2a2550; transform: translateY(-1px); }
    button.active {
      background: #7c3aed;
      box-shadow: 0 0 12px rgba(124,58,237,0.5);
      color: white;
    }
    #search-wrap {
      position: relative;
      margin: 0 24px 20px;
    }
    #search {
      width: 100%;
      padding: 12px 16px 12px 48px;
      border-radius: 4px;
      background: #1e1b38;
      border: none;
      color: #e0d8ff;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }
    #search:focus {
      background: #2a2550;
      box-shadow: 0 0 0 2px #a78bfa;
    }
    #search::placeholder { color: #8a7dff; }
    #search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: #8a7dff;
      pointer-events: none;
      transition: color 0.3s ease;
    }
    #search:focus ~ #search-icon {
      color: #a78bfa;
    }
    #list {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 60px;
    }
    #list::-webkit-scrollbar { width: 5px; }
    #list::-webkit-scrollbar-thumb { background: #2a2550; border-radius: 4px; }
    .item {
      padding: 14px 18px;
      margin: 10px 0;
      background: #181527;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.25s ease;
      opacity: 0;
      transform: translateY(30px) scale(0.96);
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .item.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .item:hover {
      transform: translateY(-6px) scale(1.03);
      background: #2a2550;
      box-shadow: 0 16px 40px rgba(167,139,250,0.18);
    }
    .item.active {
      background: #28233f;
      border: 1px solid #a78bfa;
      box-shadow: 0 0 20px rgba(167,139,250,0.3);
    }
    .star {
      font-size: 1.5rem;
      color: #8a7dff;
      transition: all 0.25s ease;
    }
    .star:hover { transform: scale(1.35); color: #c4b5fd; }
    .star.fav { color: #c4b5fd; transform: scale(1.15); }
    #loadingMore {
      text-align: center;
      padding: 40px 0;
      color: #8a7dff;
      font-size: 1.1rem;
      font-weight: 500;
    }
    #player {
      flex: 1;
      background: #000;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    iframe.loaded { opacity: 1; }
    #bottomPanels {
      padding: 20px 24px;
      border-top: 1px solid #2a2550;
      background: #0f0c1a;
      font-size: 0.95rem;
    }
    .panelTitle {
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 12px;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .smallItem {
      padding: 10px 0;
      color: #d1c8ff;
      cursor: pointer;
      transition: color 0.25s ease;
    }
    .smallItem:hover { color: #c4b5fd; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="header">LunaFlix</div>

  <div id="toggle">
    <button id="movieBtn" class="active">Movies</button>
    <button id="tvBtn">TV</button>
  </div>

  <div id="search-wrap">
    <svg id="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.3-4.3"/>
    </svg>
    <input id="search" placeholder="Search titles..." autocomplete="off"/>
  </div>

  <div id="list"></div>
  <div id="loadingMore" style="display:none;">Loading more...</div>

  <div id="bottomPanels">
    <div class="panelTitle">Favorites</div>
    <div id="favorites"></div>
    <div class="panelTitle" style="margin-top:16px;">Recent</div>
    <div id="recent"></div>
  </div>
</div>

<div id="player">
  <iframe id="frame" allowfullscreen allow="autoplay"></iframe>
</div>

<script>
const BASE_EMBED = "https://vidsrc.cc/v2/embed";
const BATCH_SIZE = 20;
const SCROLL_THRESHOLD = 500;

let currentType = localStorage.getItem("type") || "movie";
let allItems = [];
let displayedCount = 0;
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");
let activeEl = null;

const listEl = document.getElementById("list");
const loadingMore = document.getElementById("loadingMore");
const searchEl = document.getElementById("search");

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

async function loadData() {
  listEl.innerHTML = "";
  displayedCount = 0;
  loadingMore.style.display = "block";

  try {
    const url = currentType === "movie"
      ? "https://vidsrc.cc/api/list/movie"
      : "https://vidsrc.cc/api/list/tv";
    const res = await fetch(url);
    const json = await res.json();
    allItems = Array.isArray(json) ? json : json.data || [];
    renderNextBatch();
  } catch (err) {
    allItems = [
      { title: "Arcane", tmdb: "995133", imdb: "tt11126994" },
      { title: "The Boys", tmdb: "82856", imdb: "tt1190634" },
      { title: "Invincible", tmdb: "95557", imdb: "tt6741278" },
      { title: "Squid Game", tmdb: "93405", imdb: "tt10919420" },
      { title: "Wednesday", tmdb: "119051", imdb: "tt13443470" },
      { title: "Stranger Things", tmdb: "66732", imdb: "tt4574334" },
      { title: "The Umbrella Academy", tmdb: "79126", imdb: "tt1312171" },
      { title: "The Witcher", tmdb: "71912", imdb: "tt5180504" },
      { title: "Bridgerton", tmdb: "87771", imdb: "tt2741602" },
      { title: "You", tmdb: "81040", imdb: "tt7335184" }
    ];
    renderNextBatch();
    listEl.insertAdjacentHTML('afterbegin', '<div style="padding:12px 20px;color:#a78bfa;font-size:0.95rem;">Demo titles (API unavailable)</div>');
  }
}

function renderNextBatch() {
  if (displayedCount >= allItems.length) {
    loadingMore.style.display = "none";
    return;
  }

  const frag = document.createDocumentFragment();
  const end = Math.min(displayedCount + BATCH_SIZE, allItems.length);

  for (let i = displayedCount; i < end; i++) {
    const item = allItems[i];
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <span>${item.title || item.name || "Untitled"}</span>
      <span class="star ${favorites.some(f => (f.tmdb || f.imdb) === (item.tmdb || item.imdb)) ? "fav" : ""}">★</span>
    `;

    div.querySelector(".star").onclick = e => {
      e.stopPropagation();
      toggleFavorite(item, div);
    };

    div.onclick = () => selectItem(item, div);

    frag.appendChild(div);
  }

  listEl.appendChild(frag);
  displayedCount = end;

  setTimeout(() => {
    const newItems = listEl.querySelectorAll('.item:not(.visible)');
    newItems.forEach((el, idx) => {
      setTimeout(() => el.classList.add('visible'), idx * 30);
    });
    loadingMore.style.display = "none";
  }, 80);
}

function selectItem(item, el) {
  if (activeEl) activeEl.classList.remove("active");
  el.classList.add("active");
  activeEl = el;
  playItem(item);
  addRecent(item);
}

function playItem(item) {
  const id = item.imdb?.startsWith("tt") ? item.imdb : item.tmdb;
  if (!id) return;

  let url = `${BASE_EMBED}/${currentType}/${id}?autoPlay=false`;

  const frame = document.getElementById("frame");
  frame.classList.remove("loaded");
  frame.src = url;
  frame.onload = () => frame.classList.add("loaded");
}

function toggleFavorite(item, itemEl) {
  const key = item.tmdb || item.imdb;
  const idx = favorites.findIndex(f => (f.tmdb || f.imdb) === key);
  const star = itemEl.querySelector(".star");

  if (idx > -1) {
    favorites.splice(idx, 1);
    star.classList.remove("fav");
  } else {
    favorites.push(item);
    star.classList.add("fav");
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderBottom("favorites");
}

function addRecent(item) {
  const key = item.tmdb || item.imdb;
  recent = recent.filter(r => (r.tmdb || r.imdb) !== key);
  recent.unshift(item);
  recent = recent.slice(0, 6);
  localStorage.setItem("recent", JSON.stringify(recent));
  renderBottom("recent");
}

function renderBottom(section) {
  const cont = document.getElementById(section);
  cont.innerHTML = "";
  const items = section === "favorites" ? favorites.slice(-6) : recent;
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "smallItem";
    div.textContent = item.title || "Untitled";
    div.onclick = () => playItem(item);
    cont.appendChild(div);
  });
}

document.getElementById("movieBtn").onclick = () => {
  currentType = "movie";
  localStorage.setItem("type", currentType);
  document.getElementById("movieBtn").classList.add("active");
  document.getElementById("tvBtn").classList.remove("active");
  loadData();
};

document.getElementById("tvBtn").onclick = () => {
  currentType = "tv";
  localStorage.setItem("type", currentType);
  document.getElementById("tvBtn").classList.add("active");
  document.getElementById("movieBtn").classList.remove("active");
  loadData();
};

searchEl.addEventListener("input", debounce(e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    listEl.innerHTML = "";
    displayedCount = 0;
    renderNextBatch();
    return;
  }
  const filtered = allItems.filter(i => (i.title || i.name || "").toLowerCase().includes(q));
  listEl.innerHTML = "";
  displayedCount = 0;
  allItems = filtered;
  renderNextBatch();
}, 220));

listEl.addEventListener("scroll", () => {
  if (listEl.scrollTop + listEl.clientHeight >= listEl.scrollHeight - SCROLL_THRESHOLD) {
    renderNextBatch();
  }
});

if (currentType === "tv") {
  document.getElementById("tvBtn").click();
} else {
  document.getElementById("movieBtn").click();
}

renderBottom("favorites");
renderBottom("recent");
</script>
</body>
</html>
