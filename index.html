<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LunaFlix</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0a14;
      --bg-elevated: #13101f;
      --surface: #1a1628;
      --surface-hover: #221d34;
      --border: #2a2545;
      --text: #e8e2f4;
      --text-muted: #8a82a0;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --accent-dim: rgba(139, 92, 246, 0.12);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
    }

    /* ===== LOCK SCREEN ===== */
    #lockScreen {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #1a1530, var(--bg) 70%);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #lockScreen.unlocking {
      opacity: 0;
      transform: scale(1.08);
      pointer-events: none;
    }

    #lockScreen.hidden { display: none; }

    .lock-particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.15;
      animation: particleFloat ease-in-out infinite;
    }

    @keyframes particleFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.4); }
    }

    .lock-logo {
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
      margin-bottom: 12px;
      text-shadow: 0 0 40px var(--accent-glow);
    }

    .lock-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .passcode-dots {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      transition: transform 0.3s ease;
    }

    .passcode-dots.shake {
      animation: shakeAnim 0.4s ease-in-out;
    }

    @keyframes shakeAnim {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-14px); }
      40% { transform: translateX(14px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }

    .dot-box {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .dot-box.filled {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      transform: scale(1.12);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .lock-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 36px;
      opacity: 0.7;
    }

    .mobile-numpad {
      display: none;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 220px;
    }

    .numpad-btn {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1.3rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .numpad-btn:active {
      transform: scale(0.92);
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    @media (max-width: 768px) {
      .mobile-numpad { display: flex; }
      .lock-hint { display: none; }
    }

    /* ===== MAIN APP ===== */
    #app {
      display: none;
      width: 100%;
      height: 100dvh;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    #app.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .app-layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 360px;
      min-width: 360px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 100;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .sidebar-close {
      display: none;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--surface);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .sidebar-close:hover { background: var(--surface-hover); }

    .type-toggle {
      display: flex;
      gap: 8px;
      padding: 16px 24px 8px;
    }

    .type-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .type-btn:hover { background: var(--surface-hover); color: var(--text); }

    .type-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .search-wrap {
      position: relative;
      margin: 12px 24px 8px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: all 0.25s ease;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .item-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .item-list::-webkit-scrollbar { width: 4px; }
    .item-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .list-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      margin: 3px 0;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0;
      transform: translateY(12px);
      text-align: left;
    }

    .list-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .list-item:hover, .list-item.focused {
      background: var(--surface);
      color: var(--text);
    }

    .list-item.focused {
      outline: 1px solid rgba(139, 92, 246, 0.3);
    }

    .list-item.active {
      background: var(--accent-dim);
      border-color: rgba(139, 92, 246, 0.4);
      color: var(--text);
    }

    .item-title { 
      overflow: hidden; 
      text-overflow: ellipsis; 
      white-space: nowrap; 
      flex: 1;
    }

    .star-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px;
      transition: all 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .star-btn:hover { transform: scale(1.25); color: var(--accent); }
    .star-btn.fav { color: var(--accent); }

    .loading-skeleton {
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin: 4px 0;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .bottom-panels {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      max-height: 200px;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-title.muted { color: var(--text-muted); }

    .small-item {
      padding: 6px 8px;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .small-item:hover { color: var(--text); background: var(--surface); }

    .no-results {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      padding: 48px 16px;
    }

    /* ===== PLAYER ===== */
    #player {
      flex: 1;
      background: var(--bg-elevated);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .player-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.06), transparent 70%);
      pointer-events: none;
    }

    .player-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
      z-index: 1;
    }

    .play-icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-icon-wrap svg { color: var(--accent); }

    .player-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .player-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .player-subtitle kbd {
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-family: 'Inter', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .player-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 2;
      transition: opacity 0.4s ease;
    }

    .player-loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #frame.loaded { opacity: 1; }

    /* ===== MOBILE MENU BUTTON ===== */
    #menuToggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 200;
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(19, 16, 31, 0.9);
      backdrop-filter: blur(12px);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: all 0.2s;
      align-items: center;
      justify-content: center;
    }

    #menuToggle:hover { background: var(--surface-hover); transform: scale(1.05); }
    #menuToggle:active { transform: scale(0.95); }

    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99;
      background: rgba(12, 10, 20, 0.6);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .mobile-overlay.visible { opacity: 1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      #menuToggle { display: flex; }
      .sidebar-close { display: flex; }

      #sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 340px;
        min-width: unset;
        max-width: 85vw;
        transform: translateX(-100%);
        box-shadow: 8px 0 40px rgba(0,0,0,0.5);
      }

      #sidebar.open { transform: translateX(0); }
    }

    @media (max-width: 480px) {
      .dot-box { width: 48px; height: 48px; font-size: 1.1rem; }
      .passcode-dots { gap: 12px; }
      .lock-subtitle { font-size: 0.75rem; margin-bottom: 36px; }
    }
  </style>
</head>
<body>

<!-- ===== LOCK SCREEN ===== -->
<div id="lockScreen">
  <div class="lock-particles" id="particles"></div>
  <div class="lock-logo">LunaFlix</div>
  <div class="lock-subtitle">Enter passcode to continue</div>

  <div class="passcode-dots" id="passcodeDots">
    <div class="dot-box" data-idx="0">1</div>
    <div class="dot-box" data-idx="1">2</div>
    <div class="dot-box" data-idx="2">3</div>
    <div class="dot-box" data-idx="3">4</div>
  </div>

  <div class="lock-hint">Type 1 2 3 4 on your keyboard</div>

  <div class="mobile-numpad" id="numpad">
    <button class="numpad-btn" data-key="1">1</button>
    <button class="numpad-btn" data-key="2">2</button>
    <button class="numpad-btn" data-key="3">3</button>
    <button class="numpad-btn" data-key="4">4</button>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <div class="app-layout">
    <button id="menuToggle" aria-label="Open menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="mobile-overlay" id="overlay"></div>

    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">LunaFlix</div>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">&times;</button>
      </div>

      <div class="type-toggle">
        <button class="type-btn active" id="movieBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
          Movies
        </button>
        <button class="type-btn" id="tvBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
          TV Shows
        </button>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input class="search-input" id="searchInput" placeholder="Search titles...  ( / to focus)" autocomplete="off" />
      </div>

      <div class="item-list" id="itemList"></div>

      <div class="bottom-panels" id="bottomPanels">
        <div id="favSection" style="display:none;">
          <div class="panel-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            Favorites
          </div>
          <div id="favList"></div>
        </div>
        <div id="recentSection" style="display:none;margin-top:12px;">
          <div class="panel-title muted">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Recent
          </div>
          <div id="recentList"></div>
        </div>
      </div>
    </aside>

    <main id="player">
      <div class="player-glow"></div>
      <div class="player-empty" id="playerEmpty">
        <div class="play-icon-wrap">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <div class="player-title">Select something to watch</div>
        <div class="player-subtitle">Browse the sidebar or press <kbd>/</kbd> to search</div>
      </div>
      <div class="player-loading hidden" id="playerLoading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Loading...</div>
      </div>
      <iframe id="frame" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </main>
  </div>
</div>

<script>
(function() {
  // ===== PASSCODE LOGIC =====
  const PASSCODE = ["1", "2", "3", "4"];
  let passcodeInput = [];
  let isUnlocking = false;

  const lockScreen = document.getElementById("lockScreen");
  const dots = document.querySelectorAll(".dot-box");
  const dotsWrap = document.getElementById("passcodeDots");
  const particlesEl = document.getElementById("particles");

  // Generate particles
  for (let i = 0; i < 25; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const size = 2 + Math.random() * 5;
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = Math.random() * 100 + "%";
    p.style.top = Math.random() * 100 + "%";
    p.style.animationDuration = (4 + Math.random() * 6) + "s";
    p.style.animationDelay = (Math.random() * 5) + "s";
    particlesEl.appendChild(p);
  }

  function handlePasscodeKey(key) {
    if (isUnlocking) return;
    if (!["1","2","3","4","5","6","7","8","9","0"].includes(key)) return;

    const expected = PASSCODE[passcodeInput.length];
    if (key !== expected) {
      dotsWrap.classList.add("shake");
      dots.forEach(d => {
        d.classList.remove("filled");
      });
      passcodeInput = [];
      setTimeout(() => dotsWrap.classList.remove("shake"), 450);
      return;
    }

    passcodeInput.push(key);
    dots[passcodeInput.length - 1].classList.add("filled");

    if (passcodeInput.length === PASSCODE.length) {
      isUnlocking = true;
      setTimeout(unlock, 500);
    }
  }

  document.addEventListener("keydown", function lockKeyHandler(e) {
    if (lockScreen.classList.contains("hidden")) return;
    handlePasscodeKey(e.key);
  });

  // Mobile numpad
  document.querySelectorAll(".numpad-btn").forEach(btn => {
    btn.addEventListener("click", () => handlePasscodeKey(btn.dataset.key));
  });

  function unlock() {
    lockScreen.classList.add("unlocking");
    const appEl = document.getElementById("app");
    appEl.style.display = "block";

    setTimeout(() => {
      lockScreen.classList.add("hidden");
      requestAnimationFrame(() => {
        setTimeout(() => appEl.classList.add("visible"), 30);
      });
    }, 600);
  }

  // ===== APP LOGIC =====
  const BASE_EMBED = "https://vidsrc.cc/v2/embed";
  const BATCH_SIZE = 20;

  let currentType = localStorage.getItem("lf_type") || "movie";
  let allItemsFull = [];
  let allItems = [];
  let displayedCount = 0;
  let favorites = JSON.parse(localStorage.getItem("lf_favorites") || "[]");
  let recent = JSON.parse(localStorage.getItem("lf_recent") || "[]");
  let activeKey = null;
  let focusIndex = -1;

  const sidebar = document.getElementById("sidebar");
  const menuToggle = document.getElementById("menuToggle");
  const overlay = document.getElementById("overlay");
  const sidebarClose = document.getElementById("sidebarClose");
  const itemList = document.getElementById("itemList");
  const searchInput = document.getElementById("searchInput");
  const movieBtn = document.getElementById("movieBtn");
  const tvBtn = document.getElementById("tvBtn");
  const frame = document.getElementById("frame");
  const playerEmpty = document.getElementById("playerEmpty");
  const playerLoading = document.getElementById("playerLoading");
  const loadingText = document.getElementById("loadingText");

  // Mobile sidebar
  menuToggle.addEventListener("click", () => openSidebar());
  overlay.addEventListener("click", () => closeSidebar());
  sidebarClose.addEventListener("click", () => closeSidebar());

  function openSidebar() {
    sidebar.classList.add("open");
    overlay.style.display = "block";
    requestAnimationFrame(() => overlay.classList.add("visible"));
  }

  function closeSidebar() {
    sidebar.classList.remove("open");
    overlay.classList.remove("visible");
    setTimeout(() => overlay.style.display = "none", 300);
  }

  function getKey(item) { return item.tmdb || item.imdb || ""; }
  function getTitle(item) { return item.title || item.name || "Untitled"; }

  // Type toggle
  function setType(type) {
    currentType = type;
    localStorage.setItem("lf_type", type);
    movieBtn.classList.toggle("active", type === "movie");
    tvBtn.classList.toggle("active", type === "tv");
    activeKey = null;
    focusIndex = -1;
    loadData();
  }

  movieBtn.addEventListener("click", () => setType("movie"));
  tvBtn.addEventListener("click", () => setType("tv"));

  // Initial type setup
  if (currentType === "tv") {
    movieBtn.classList.remove("active");
    tvBtn.classList.add("active");
  }

  // Search
  let searchTimer;
  searchInput.addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const q = searchInput.value.toLowerCase().trim();
      if (!q) {
        allItems = allItemsFull.slice();
      } else {
        allItems = allItemsFull.filter(i => getTitle(i).toLowerCase().includes(q));
      }
      displayedCount = 0;
      focusIndex = -1;
      itemList.innerHTML = "";
      renderBatch();
    }, 200);
  });

  // Keyboard navigation
  document.addEventListener("keydown", (e) => {
    if (lockScreen && !lockScreen.classList.contains("hidden")) return;

    if (e.key === "/" && document.activeElement !== searchInput) {
      e.preventDefault();
      searchInput.focus();
      return;
    }

    if (e.key === "Escape" && document.activeElement === searchInput) {
      searchInput.blur();
      return;
    }

    const listItems = itemList.querySelectorAll(".list-item");
    if (!listItems.length) return;

    if (e.key === "ArrowDown") {
      e.preventDefault();
      focusIndex = Math.min(focusIndex + 1, listItems.length - 1);
      updateFocus(listItems);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      focusIndex = Math.max(focusIndex - 1, 0);
      updateFocus(listItems);
    } else if (e.key === "Enter" && focusIndex >= 0 && focusIndex < allItems.length) {
      e.preventDefault();
      selectItem(allItems[focusIndex], listItems[focusIndex]);
    }
  });

  function updateFocus(listItems) {
    listItems.forEach((el, i) => {
      el.classList.toggle("focused", i === focusIndex);
    });
    if (listItems[focusIndex]) {
      listItems[focusIndex].scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
  }

  // Scroll to load more
  itemList.addEventListener("scroll", () => {
    if (itemList.scrollTop + itemList.clientHeight >= itemList.scrollHeight - 300) {
      renderBatch();
    }
  });

  // Load data
  async function loadData() {
    itemList.innerHTML = "";
    displayedCount = 0;

    // Show skeletons
    for (let i = 0; i < 8; i++) {
      const sk = document.createElement("div");
      sk.className = "loading-skeleton";
      sk.style.animationDelay = (i * 100) + "ms";
      itemList.appendChild(sk);
    }

    try {
      const url = currentType === "movie"
        ? "https://vidsrc.cc/api/list/movie"
        : "https://vidsrc.cc/api/list/tv";
      const res = await fetch(url);
      const json = await res.json();
      allItemsFull = Array.isArray(json) ? json : (json.data || []);
    } catch {
      allItemsFull = [
        { title: "Arcane", tmdb: "995133", imdb: "tt11126994" },
        { title: "The Boys", tmdb: "82856", imdb: "tt1190634" },
        { title: "Invincible", tmdb: "95557", imdb: "tt6741278" },
        { title: "Squid Game", tmdb: "93405", imdb: "tt10919420" },
        { title: "Wednesday", tmdb: "119051", imdb: "tt13443470" },
        { title: "Stranger Things", tmdb: "66732", imdb: "tt4574334" },
        { title: "The Umbrella Academy", tmdb: "79126", imdb: "tt1312171" },
        { title: "The Witcher", tmdb: "71912", imdb: "tt5180504" },
        { title: "Bridgerton", tmdb: "87771", imdb: "tt2741602" },
        { title: "You", tmdb: "81040", imdb: "tt7335184" }
      ];
    }

    allItems = allItemsFull.slice();
    itemList.innerHTML = "";
    renderBatch();
  }

  function renderBatch() {
    if (displayedCount >= allItems.length) return;

    const end = Math.min(displayedCount + BATCH_SIZE, allItems.length);
    const frag = document.createDocumentFragment();

    for (let i = displayedCount; i < end; i++) {
      const item = allItems[i];
      const key = getKey(item);
      const isFav = favorites.some(f => getKey(f) === key);

      const btn = document.createElement("button");
      btn.className = "list-item" + (activeKey === key ? " active" : "");
      btn.innerHTML = `
        <span class="item-title">${getTitle(item)}</span>
        <span class="star-btn ${isFav ? 'fav' : ''}">&#9733;</span>
      `;

      const starEl = btn.querySelector(".star-btn");
      starEl.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleFavorite(item, starEl);
      });

      btn.addEventListener("click", () => selectItem(item, btn));
      btn.addEventListener("mouseenter", () => {
        focusIndex = i;
        itemList.querySelectorAll(".list-item").forEach((el, idx) => {
          el.classList.toggle("focused", idx === i);
        });
      });

      frag.appendChild(btn);
    }

    itemList.appendChild(frag);
    displayedCount = end;

    // Stagger animations
    requestAnimationFrame(() => {
      const newItems = itemList.querySelectorAll(".list-item:not(.visible)");
      newItems.forEach((el, idx) => {
        setTimeout(() => el.classList.add("visible"), idx * 25);
      });
    });
  }

  function selectItem(item, el) {
    activeKey = getKey(item);
    itemList.querySelectorAll(".list-item").forEach(e => e.classList.remove("active"));
    if (el) el.classList.add("active");
    playItem(item);
    addRecent(item);
    closeSidebar();
  }

  function playItem(item) {
    const id = item.imdb && item.imdb.startsWith("tt") ? item.imdb : item.tmdb;
    if (!id) return;

    playerEmpty.style.display = "none";
    playerLoading.classList.remove("hidden");
    loadingText.textContent = "Loading " + getTitle(item) + "...";
    frame.classList.remove("loaded");

    const src = BASE_EMBED + "/" + currentType + "/" + id + "?autoPlay=false";
    frame.src = src;
    frame.onload = () => {
      frame.classList.add("loaded");
      playerLoading.classList.add("hidden");
    };
  }

  function toggleFavorite(item, starEl) {
    const key = getKey(item);
    const idx = favorites.findIndex(f => getKey(f) === key);
    if (idx > -1) {
      favorites.splice(idx, 1);
      starEl.classList.remove("fav");
    } else {
      favorites.push(item);
      starEl.classList.add("fav");
    }
    localStorage.setItem("lf_favorites", JSON.stringify(favorites));
    renderBottomPanels();
  }

  function addRecent(item) {
    const key = getKey(item);
    recent = recent.filter(r => getKey(r) !== key);
    recent.unshift(item);
    recent = recent.slice(0, 6);
    localStorage.setItem("lf_recent", JSON.stringify(recent));
    renderBottomPanels();
  }

  function renderBottomPanels() {
    const favSection = document.getElementById("favSection");
    const favList = document.getElementById("favList");
    const recentSection = document.getElementById("recentSection");
    const recentList = document.getElementById("recentList");

    if (favorites.length > 0) {
      favSection.style.display = "block";
      favList.innerHTML = "";
      favorites.slice(0, 5).forEach(item => {
        const div = document.createElement("div");
        div.className = "small-item";
        div.textContent = getTitle(item);
        div.addEventListener("click", () => {
          playItem(item);
          addRecent(item);
        });
        favList.appendChild(div);
      });
    } else {
      favSection.style.display = "none";
    }

    if (recent.length > 0) {
      recentSection.style.display = "block";
      recentList.innerHTML = "";
      recent.slice(0, 5).forEach(item => {
        const div = document.createElement("div");
        div.className = "small-item";
        div.textContent = getTitle(item);
        div.addEventListener("click", () => {
          playItem(item);
          addRecent(item);
        });
        recentList.appendChild(div);
      });
    } else {
      recentSection.style.display = "none";
    }
  }

  // Initialize
  renderBottomPanels();
  loadData();
})();
</script>
</body>
</html>
