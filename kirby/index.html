<!DOCTYPE html>
<html>
<head><style>body{margin:0;height:100vh;background:#111;display:flex;align-items:center;justify-content:center;}canvas{width:800px;height:800px;}</style></head>
<body><canvas id=c></canvas><script>
const m = {"vertices":[{"x":-70,"y":-70,"z":-70},{"x":70,"y":-70,"z":-70},{"x":70,"y":70,"z":-70},{"x":-70,"y":70,"z":-70},{"x":-70,"y":-70,"z":70},{"x":70,"y":-70,"z":70},{"x":70,"y":70,"z":70},{"x":-70,"y":70,"z":70},{"x":-71,"y":0,"z":-20},{"x":-71,"y":0,"z":-30},{"x":-71,"y":-20,"z":-20},{"x":-71,"y":-20,"z":-30},{"x":-71,"y":0,"z":30},{"x":-71,"y":0,"z":20},{"x":-71,"y":-20,"z":20},{"x":-71,"y":-20,"z":30},{"x":-71,"y":20,"z":-20},{"x":-71,"y":40,"z":-20},{"x":-71,"y":40,"z":20},{"x":-71,"y":20,"z":20},{"x":-20,"y":70,"z":-40},{"x":-50,"y":80,"z":-40},{"x":-50,"y":80,"z":20},{"x":-20,"y":70,"z":20},{"x":-20,"y":80,"z":20},{"x":-20,"y":80,"z":-40},{"x":-50,"y":90,"z":-40},{"x":-50,"y":90,"z":20},{"x":-40,"y":0,"z":-70},{"x":-20,"y":0,"z":-70},{"x":-20,"y":30,"z":-80},{"x":-40,"y":30,"z":-80},{"x":-40,"y":0,"z":70},{"x":-20,"y":0,"z":70},{"x":-20,"y":30,"z":80},{"x":-40,"y":30,"z":80}],"faces":[{"a":0,"b":1,"c":2,"color":"#d74894"},{"a":0,"b":2,"c":3,"color":"#d74894"},{"a":4,"b":6,"c":5,"color":"#d74894"},{"a":4,"b":7,"c":6,"color":"#d74894"},{"a":0,"b":5,"c":1,"color":"#d74894"},{"a":0,"b":4,"c":5,"color":"#d74894"},{"a":3,"b":2,"c":6,"color":"#d74894"},{"a":3,"b":6,"c":7,"color":"#d74894"},{"a":0,"b":3,"c":7,"color":"#d74894"},{"a":0,"b":7,"c":4,"color":"#d74894"},{"a":1,"b":5,"c":6,"color":"#d74894"},{"a":1,"b":6,"c":2,"color":"#d74894"},{"a":9,"b":8,"c":10,"color":"#000000"},{"a":9,"b":10,"c":11,"color":"#000000"},{"a":12,"b":13,"c":14,"color":"#000000"},{"a":12,"b":15,"c":14,"color":"#000000"},{"a":16,"b":17,"c":18,"color":"#b53b7c"},{"a":16,"b":19,"c":18,"color":"#b53b7c"},{"a":27,"b":26,"c":21,"color":"#e92525"},{"a":27,"b":22,"c":21,"color":"#e92525"},{"a":22,"b":27,"c":24,"color":"#e92525"},{"a":22,"b":23,"c":24,"color":"#e92525"},{"a":25,"b":23,"c":24,"color":"#e92525"},{"a":25,"b":23,"c":20,"color":"#e92525"},{"a":25,"b":21,"c":26,"color":"#e92525"},{"a":25,"b":21,"c":20,"color":"#e92525"},{"a":25,"b":27,"c":26,"color":"#e92525"},{"a":25,"b":27,"c":24,"color":"#e92525"},{"a":31,"b":30,"c":28,"color":"#b53b7c"},{"a":29,"b":30,"c":28,"color":"#b53b7c"},{"a":35,"b":32,"c":34,"color":"#b53b7c"},{"a":33,"b":32,"c":34,"color":"#b53b7c"}]};
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
canvas.width=800;canvas.height=800;
let r=0;
function loop(){
  r+=0.01;ctx.clearRect(0,0,800,800);
  m.faces.map(f=>{
    function p(v){
      let x1=v.x*Math.cos(r)-v.z*Math.sin(r);let z1=v.z*Math.cos(r)+v.x*Math.sin(r);
      let y1=v.y*Math.cos(0.2)-z1*Math.sin(0.2);let s=400/(400+z1);
      return {x:x1*s+400,y:y1*s+400,z:z1}
    }
    let a=p(m.vertices[f.a]),b=p(m.vertices[f.b]),c=p(m.vertices[f.c]);
    return {a,b,c,d:(a.z+b.z+c.z)/3,color:f.color}
  }).sort((a,b)=>b.d-a.d).forEach(f=>{
    ctx.beginPath();ctx.moveTo(f.a.x,f.a.y);ctx.lineTo(f.b.x,f.b.y);ctx.lineTo(f.c.x,f.c.y);ctx.closePath();
    ctx.fillStyle=f.color;ctx.fill();ctx.strokeStyle='#fff1';ctx.stroke();
  });requestAnimationFrame(loop);
}loop();
</script></body></html>
