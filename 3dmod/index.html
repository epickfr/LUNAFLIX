<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Inserter & Spinner</title>
  <style>
    body { margin:0; overflow:hidden; background:#0a0a0a; font-family:Arial, sans-serif; color:white; }
    canvas { display:block; }

    #toolbar {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 12px 20px;
      background: #00cc88;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    button:hover { background: #00ffaa; }

    #settings {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(20,20,30,0.95);
      padding: 18px;
      border-radius: 12px;
      width: 280px;
      z-index: 100;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    .setting {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      opacity: 0.9;
    }
    input[type="range"] {
      width: 100%;
    }
    select {
      width: 100%;
      padding: 8px;
      background: #1f1f2e;
      color: white;
      border: 1px solid #444;
      border-radius: 6px;
    }

    #info {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <button id="insertBtn">📥 Insert Model</button>
  </div>

  <div id="settings">
    <h3>Environment Settings</h3>
    
    <div class="setting">
      <label>Background Type</label>
      <select id="bgType">
        <option value="dark">Dark Space</option>
        <option value="light">Light Studio</option>
        <option value="gradient">Gradient</option>
      </select>
    </div>

    <div class="setting">
      <label>Lighting Intensity <span id="lightVal">1.2</span></label>
      <input type="range" id="lightIntensity" min="0.1" max="3" step="0.1" value="1.2">
    </div>

    <div class="setting">
      <label>Auto Rotate Speed <span id="speedVal">0.8</span></label>
      <input type="range" id="rotateSpeed" min="0" max="3" step="0.1" value="0.8">
    </div>

    <div class="setting">
      <label>Model Scale <span id="scaleVal">1.0</span></label>
      <input type="range" id="modelScale" min="0.2" max="3" step="0.1" value="1.0">
    </div>

    <button id="resetBtn" style="width:100%; margin-top:10px; background:#ff5555;">Reset All</button>
  </div>

  <div id="info">
    Drag & drop supported • Left click + drag to orbit • Scroll to zoom
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/OBJLoader.js"></script>

  <script>
    let scene, camera, renderer, controls, currentModel = null;
    let dirLight;

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
      camera.position.set(0, 3, 10);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      // Lights
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5, 10, 8);
      scene.add(dirLight);

      // Controls
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.8;
      controls.target.set(0, 1, 0);

      // Grid
      scene.add(new THREE.GridHelper(20, 20, 0x333333, 0x222222));

      animate();
      window.addEventListener('resize', onResize);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Load model (GLTF/GLB or OBJ)
    function loadModel(file) {
      const ext = file.name.toLowerCase().split('.').pop();

      if (ext === 'glb' || ext === 'gltf') {
        const loader = new THREE.GLTFLoader();
        const reader = new FileReader();
        reader.onload = e => loader.parse(e.target.result, '', gltf => addModel(gltf.scene));
        reader.readAsArrayBuffer(file);
      } 
      else if (ext === 'obj') {
        const loader = new THREE.OBJLoader();
        const reader = new FileReader();
        reader.onload = e => {
          const obj = loader.parse(e.target.result);
          addModel(obj);
        };
        reader.readAsText(file);
      }
    }

    function addModel(model) {
      if (currentModel) scene.remove(currentModel);
      currentModel = model;
      scene.add(currentModel);

      // Auto center + scale
      const box = new THREE.Box3().setFromObject(currentModel);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 6 / maxDim;

      currentModel.scale.set(scale, scale, scale);
      currentModel.position.sub(center.multiplyScalar(scale));
      currentModel.position.y += 0.2;

      controls.target.copy(currentModel.position);
    }

    // UI Controls
    document.getElementById('insertBtn').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.glb,.gltf,.obj';
      input.onchange = e => {
        if (e.target.files[0]) loadModel(e.target.files[0]);
      };
      input.click();
    });

    // Environment Settings
    const bgSelect = document.getElementById('bgType');
    const lightSlider = document.getElementById('lightIntensity');
    const speedSlider = document.getElementById('rotateSpeed');
    const scaleSlider = document.getElementById('modelScale');

    bgSelect.addEventListener('change', () => {
      if (bgSelect.value === 'dark') {
        scene.background = new THREE.Color(0x0a0a0a);
      } else if (bgSelect.value === 'light') {
        scene.background = new THREE.Color(0xaaaaaa);
      } else {
        scene.background = new THREE.Color(0x112233);
      }
    });

    lightSlider.addEventListener('input', () => {
      dirLight.intensity = parseFloat(lightSlider.value);
      document.getElementById('lightVal').textContent = lightSlider.value;
    });

    speedSlider.addEventListener('input', () => {
      controls.autoRotateSpeed = parseFloat(speedSlider.value);
      document.getElementById('speedVal').textContent = speedSlider.value;
    });

    scaleSlider.addEventListener('input', () => {
      if (currentModel) {
        const currentScale = currentModel.scale.x;
        const newScale = parseFloat(scaleSlider.value);
        currentModel.scale.setScalar(newScale);
      }
      document.getElementById('scaleVal').textContent = scaleSlider.value;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (currentModel) {
        currentModel.scale.set(1,1,1);
        scaleSlider.value = 1.0;
        document.getElementById('scaleVal').textContent = "1.0";
      }
      controls.autoRotateSpeed = 0.8;
      speedSlider.value = 0.8;
      document.getElementById('speedVal').textContent = "0.8";
      dirLight.intensity = 1.2;
      lightSlider.value = 1.2;
      document.getElementById('lightVal').textContent = "1.2";
    });

    // Drag & Drop support
    document.addEventListener('dragover', e => { e.preventDefault(); });
    document.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.files[0]) loadModel(e.dataTransfer.files[0]);
    });

    // Start
    init();
  </script>
</body>
</html>
